<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品分类管理系统</title>
    <!-- 引入样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <h1>商品分类管理</h1>
    <!-- 新增退出按钮 -->
    <button class="btn logout-btn" onclick="logout()">退出登录</button>

    <h1>商品分类管理</h1>
    <!-- 新增/编辑表单 -->
    <div class="form-card">
        <h3 id="form-title">新增分类</h3>
        <form id="category-form">
            <input type="hidden" id="category-id">
            <div class="form-item">
                <label for="category-name">分类名称：</label>
                <input type="text" id="category-name" required placeholder="请输入分类名称">
            </div>
            <div class="form-item">
                <label for="category-sort">排序序号：</label>
                <input type="number" id="category-sort" required placeholder="数字越大越靠前">
            </div>
            <button type="submit" class="btn submit-btn">提交</button>
            <button type="button" class="btn reset-btn" onclick="resetForm()">重置</button>
        </form>
    </div>

    <!-- 分类列表 -->
    <div class="list-card">
        <h3>分类列表</h3>
        <table id="category-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>分类名称</th>
                <th>排序序号</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <!-- 列表数据由JS动态渲染 -->
            </tbody>
        </table>
    </div>
</div>

<!-- 引入JS -->
<script src="js/app.js"></script>
</body>
</html>
