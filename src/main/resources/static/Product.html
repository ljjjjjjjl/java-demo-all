<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理 - 商品分类管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <!-- 退出按钮 -->
    <button class="btn logout-btn" onclick="logout()">退出登录</button>

    <!-- 导航栏 -->
    <div class="nav-bar">
        <a href="index.html" class="nav-link">分类管理</a>
        <a href="product.html" class="nav-link active">商品管理</a>
    </div>

    <h1>商品管理</h1>

    <!-- 新增/编辑表单 -->
    <div class="form-card">
        <h3 id="form-title">新增商品</h3>
        <form id="product-form">
            <input type="hidden" id="product-id">
            <div class="form-item">
                <label for="product-name">商品名称：</label>
                <input type="text" id="product-name" required placeholder="请输入商品名称">
            </div>
            <div class="form-item">
                <label for="product-price">商品价格：</label>
                <input type="number" id="product-price" step="0.01" min="0" required placeholder="请输入商品价格（元）">
            </div>
            <div class="form-item">
                <label for="product-stock">库存数量：</label>
                <input type="number" id="product-stock" min="0" required placeholder="请输入库存数量">
            </div>
            <div class="form-item">
                <label for="product-status">商品状态：</label>
                <select id="product-status" required>
                    <option value="1">上架</option>
                    <option value="0">下架</option>
                </select>
            </div>
            <div class="form-item">
                <label for="product-category">所属分类：</label>
                <select id="product-category" required>
                    <!-- 分类选项由JS动态加载 -->
                    <option value="">请选择分类</option>
                </select>
            </div>
            <button type="submit" class="btn submit-btn">提交</button>
            <button type="button" class="btn reset-btn" onclick="resetForm()">重置</button>
        </form>
    </div>

    <!-- 商品列表 -->
    <div class="list-card">
        <h3>商品列表</h3>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="输入商品名称搜索...">
            <button class="btn search-btn" onclick="searchProduct()">搜索</button>
            <button class="btn reset-search-btn" onclick="resetSearch()">重置</button>
        </div>
        <table id="product-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>商品名称</th>
                <th>价格（元）</th>
                <th>库存</th>
                <th>状态</th>
                <th>所属分类</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <!-- 列表数据由JS动态渲染 -->
            </tbody>
        </table>
    </div>
</div>

<script src="js/product.js"></script>
</body>
</html>
